<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>East | West Club — Seattle</title>
  <meta name="description" content="A modern urban club where performance, wellness, and community come together. Seattle — Opening Soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #111110;
      --gold: #B9975B;
      --cream: #E8E0D0;
      --muted: #6B6560;
      --serif: 'Cormorant', Georgia, serif;
      --sans: 'Inter', -apple-system, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Atmospheric background images ── */
    .atmosphere {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .atmosphere__layer {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: breathe 18s ease-in-out infinite;
    }

    .atmosphere__layer--1 {
      background-image: url('assets/lounge.jpg');
      animation-delay: 0s;
    }

    .atmosphere__layer--2 {
      background-image: url('assets/private-bay.jpg');
      animation-delay: -6s;
    }

    .atmosphere__layer--3 {
      background-image: url('assets/rooftop.jpg');
      animation-delay: -12s;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0; transform: scale(1.02); }
      30%, 50% { opacity: 0.1; transform: scale(1.05); }
    }

    /* Grain overlay for analog texture */
    .atmosphere::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.5;
      mix-blend-mode: overlay;
    }

    /* Dark vignette */
    .atmosphere::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, var(--bg) 80%);
    }

    /* ── Page content ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }

    /* ── Logo ── */
    .logo-wrap {
      position: relative;
      isolation: isolate;
      margin-bottom: 4.5rem;
    }

    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -10px;
      background: var(--bg);
      z-index: -1;
    }

    .logo {
      display: block;
      width: 200px;
      filter: invert(1) sepia(1) saturate(2) hue-rotate(15deg) brightness(0.85);
      mix-blend-mode: screen;
    }

    /* ── Tagline ── */
    .tagline {
      font-family: var(--serif);
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 300;
      line-height: 1;
      text-align: center;
      letter-spacing: 0.06em;
      color: var(--cream);
      margin-bottom: 2.5rem;
    }

    .tagline span {
      display: inline-block;
      margin: 0 0.35em;
    }

    .tagline span:first-child {
      margin-left: 0;
    }

    .tagline span:last-child {
      margin-right: 0;
    }

    /* ── Divider — the | motif ── */
    .divider {
      width: 1px;
      height: 48px;
      background: var(--gold);
      opacity: 0.5;
      margin-bottom: 2.5rem;
    }

    /* ── Location line ── */
    .location {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4rem;
    }

    /* ── Email capture — underline style ── */
    .signup {
      width: 100%;
      max-width: 360px;
      position: relative;
    }

    .signup__form {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--muted);
      transition: border-color 0.3s;
    }

    .signup__form:focus-within {
      border-color: var(--gold);
    }

    .signup__input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--cream);
      padding: 0.75rem 0;
      letter-spacing: 0.02em;
    }

    .signup__input::placeholder {
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .signup__submit {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.75rem 0 0.75rem 1rem;
      display: flex;
      align-items: center;
      transition: transform 0.2s;
    }

    .signup__submit:hover {
      transform: translateX(3px);
    }

    .signup__submit svg {
      width: 20px;
      height: 20px;
      stroke: var(--gold);
      stroke-width: 1.5;
      fill: none;
    }

    .signup__label {
      font-family: var(--sans);
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 1rem;
      text-align: center;
    }

    .signup__success {
      display: none;
      text-align: center;
    }

    .signup__success-text {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-weight: 300;
      color: var(--cream);
      letter-spacing: 0.02em;
    }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1;
      text-align: center;
      padding: 1.5rem 2rem;
      pointer-events: none;
    }

    .footer__text {
      font-family: var(--sans);
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.5;
    }

    /* ── Entry animation ── */
    .logo-wrap,
    .tagline,
    .divider,
    .location,
    .signup {
      animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo-wrap  { animation-delay: 0.1s; }
    .tagline    { animation-delay: 0.3s; }
    .tagline span { animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .tagline span:nth-child(1) { animation-delay: 0.35s; }
    .tagline span:nth-child(2) { animation-delay: 0.5s; }
    .tagline span:nth-child(3) { animation-delay: 0.65s; }
    .divider    { animation-delay: 0.8s; }
    .location   { animation-delay: 0.9s; }
    .signup     { animation-delay: 1.05s; }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page {
        padding: 3rem 1.5rem;
      }

      .logo {
        width: 140px;
        margin-bottom: 3.5rem;
      }

      .divider {
        height: 36px;
      }

      .signup {
        max-width: 100%;
      }
    }

    @media (max-width: 380px) {
      .logo {
        width: 120px;
      }
    }
  </style>
</head>
<body>

  <!-- Atmospheric background — renders at low opacity, crossfading -->
  <div class="atmosphere" aria-hidden="true">
    <div class="atmosphere__layer atmosphere__layer--1"></div>
    <div class="atmosphere__layer atmosphere__layer--2"></div>
    <div class="atmosphere__layer atmosphere__layer--3"></div>
  </div>

  <!-- Content -->
  <main class="page">
    <div class="logo-wrap">
      <img src="assets/logo.jpg" alt="East | West Club" class="logo">
    </div>

    <p class="tagline"><span>Performance.</span> <span>Wellness.</span> <span>Community.</span></p>

    <div class="divider" aria-hidden="true"></div>

    <p class="location">Queen Anne, Seattle &nbsp;&middot;&nbsp; Opening Soon</p>

    <!-- TODO: Replace YOUR_FORM_ID with your Formspree form ID (free at formspree.io) -->
    <div class="signup" id="signupWrap">
      <form class="signup__form" id="emailForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <input
          type="email"
          name="email"
          class="signup__input"
          placeholder="Your email"
          required
          autocomplete="email"
          aria-label="Email address"
        >
        <button type="submit" class="signup__submit" aria-label="Join the list">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="14 7 19 12 14 17"></polyline>
          </svg>
        </button>
      </form>
      <p class="signup__label">Join the list</p>

      <div class="signup__success" id="formSuccess">
        <p class="signup__success-text">We'll be in touch.</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p class="footer__text">East | West Club &mdash; Est. 2025</p>
  </footer>

  <script>
    const form = document.getElementById('emailForm');
    const wrap = document.getElementById('signupWrap');
    const success = document.getElementById('formSuccess');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      try {
        await fetch(form.action, {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });
        form.style.display = 'none';
        wrap.querySelector('.signup__label').style.display = 'none';
        success.style.display = 'block';
      } catch (err) {
        form.submit();
      }
    });
  </script>

</body>
</html>
