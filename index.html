<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-24TQKVFXJZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-24TQKVFXJZ');
  </script>
  <title>East | West Club — Seattle</title>
  <meta name="description" content="A modern urban club where performance, wellness, and community come together. Seattle — Opening Soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #111110;
      --gold: #B9975B;
      --cream: #F2EDE4;
      --muted: #8A847E;
      --serif: 'Cormorant', Georgia, serif;
      --sans: 'Inter', -apple-system, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Atmospheric background images ── */
    .atmosphere {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .atmosphere__layer {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: crossfade 49s ease-in-out infinite;
    }

    .atmosphere__layer--1 {
      background-image: url('assets/lounge.jpg');
      animation-delay: 0s;
    }

    .atmosphere__layer--2 {
      background-image: url('assets/golf-sim.jpg');
      animation-delay: -7s;
    }

    .atmosphere__layer--3 {
      background-image: url('assets/private-bay.jpg');
      animation-delay: -14s;
    }

    .atmosphere__layer--4 {
      background-image: url('assets/entry.jpg');
      animation-delay: -21s;
    }

    .atmosphere__layer--5 {
      background-image: url('assets/wedding.jpg');
      animation-delay: -28s;
    }

    .atmosphere__layer--6 {
      background-image: url('assets/rooftop.jpg');
      animation-delay: -35s;
    }

    .atmosphere__layer--7 {
      background-image: url('assets/qbr.jpg');
      animation-delay: -42s;
    }

    @keyframes crossfade {
      0%   { opacity: 0;    transform: scale(1); }
      3%   { opacity: 0.2;  transform: scale(1.01); }
      12%  { opacity: 0.2;  transform: scale(1.04); }
      15%  { opacity: 0;    transform: scale(1.05); }
      100% { opacity: 0;    transform: scale(1); }
    }

    /* Grain overlay for analog texture */
    .atmosphere::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.5;
      mix-blend-mode: overlay;
    }

    /* Dark vignette */
    .atmosphere::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, var(--bg) 80%);
    }

    /* ── Page content ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }

    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 55% 60% at center, rgba(17,17,16,0.65) 0%, transparent 100%);
      pointer-events: none;
    }

    /* ── Logo ── */
    .logo {
      display: block;
      width: 200px;
      margin-bottom: 2rem;
    }

    /* ── Tagline ── */
    .tagline {
      font-family: var(--serif);
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 400;
      line-height: 1;
      text-align: center;
      letter-spacing: 0.06em;
      color: var(--cream);
      margin-bottom: 1.8rem;
    }

    .tagline span {
      display: inline-block;
      margin: 0 0.35em;
    }

    .tagline span:first-child {
      margin-left: 0;
    }

    .tagline span:last-child {
      margin-right: 0;
    }

    /* ── Location line ── */
    .location {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5.5rem;
    }

    /* ── Email capture — underline style ── */
    .signup {
      width: 100%;
      max-width: 360px;
      position: relative;
    }

    .signup__form {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--muted);
      transition: border-color 0.3s;
    }

    .signup__form:focus-within {
      border-color: var(--gold);
    }

    .signup__input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--cream);
      padding: 0.75rem 0;
      letter-spacing: 0.02em;
      -webkit-appearance: none;
    }

    .signup__input:-webkit-autofill,
    .signup__input:-webkit-autofill:hover,
    .signup__input:-webkit-autofill:focus,
    .signup__input:-webkit-autofill:active {
      -webkit-text-fill-color: #F2EDE4 !important;
      -webkit-box-shadow: 0 0 0 1000px #111110 inset !important;
      box-shadow: 0 0 0 1000px #111110 inset !important;
      background-color: #111110 !important;
      caret-color: #F2EDE4;
      transition: background-color 5000s ease-in-out 0s;
    }

    .signup__input::placeholder {
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .signup__submit {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.75rem 0 0.75rem 1rem;
      display: flex;
      align-items: center;
      transition: transform 0.2s;
    }

    .signup__submit:hover {
      transform: translateX(3px);
    }

    .signup__submit svg {
      width: 20px;
      height: 20px;
      stroke: var(--gold);
      stroke-width: 1.5;
      fill: none;
    }

    .signup__label {
      font-family: var(--sans);
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 1rem;
      text-align: center;
    }

    .signup__success {
      display: none;
      text-align: center;
    }

    .signup__success-text {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-weight: 300;
      color: var(--cream);
      letter-spacing: 0.02em;
    }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1;
      text-align: center;
      padding: 1.5rem 2rem;
      pointer-events: none;
    }

    .footer__text {
      font-family: var(--sans);
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.5;
    }

    /* ── Entry animation ── */
    .logo,
    .tagline,
    .location,
    .signup {
      animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo       { animation-delay: 0.1s; }
    .tagline    { animation-delay: 0.3s; }
    .tagline span { animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .tagline span:nth-child(1) { animation-delay: 0.35s; }
    .tagline span:nth-child(2) { animation-delay: 0.5s; }
    .tagline span:nth-child(3) { animation-delay: 0.65s; }
    .location   { animation-delay: 0.8s; }
    .signup     { animation-delay: 0.95s; }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page {
        padding: 3rem 1.5rem;
      }

      .logo {
        width: 140px;
        margin-bottom: 3.5rem;
      }

      .divider {
        height: 36px;
      }

      .signup {
        max-width: 100%;
      }
    }

    @media (max-width: 380px) {
      .logo {
        width: 120px;
      }
    }
  </style>
</head>
<body>

  <!-- Atmospheric background — renders at low opacity, crossfading -->
  <div class="atmosphere" aria-hidden="true">
    <div class="atmosphere__layer atmosphere__layer--1"></div>
    <div class="atmosphere__layer atmosphere__layer--2"></div>
    <div class="atmosphere__layer atmosphere__layer--3"></div>
    <div class="atmosphere__layer atmosphere__layer--4"></div>
    <div class="atmosphere__layer atmosphere__layer--5"></div>
    <div class="atmosphere__layer atmosphere__layer--6"></div>
    <div class="atmosphere__layer atmosphere__layer--7"></div>
  </div>

  <!-- Content -->
  <main class="page">
    <img src="assets/logo.png" alt="East | West Club" class="logo">

    <p class="tagline"><span>Golf.</span> <span>Social.</span> <span>Wellness.</span></p>

    <p class="location">Seattle &nbsp;&middot;&nbsp; Opening Soon</p>

    <div class="signup" id="signupWrap">
      <form class="signup__form" id="emailForm" action="#" method="POST">
        <input
          type="email"
          name="email"
          class="signup__input"
          placeholder="Your email"
          required
          autocomplete="email"
          aria-label="Email address"
        >
        <button type="submit" class="signup__submit" aria-label="Join the list">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="14 7 19 12 14 17"></polyline>
          </svg>
        </button>
      </form>
      <p class="signup__label">Join the waitlist</p>

      <div class="signup__success" id="formSuccess">
        <p class="signup__success-text">We'll be in touch.</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p class="footer__text">East | West Club &mdash; Est. 2025</p>
  </footer>

  <script>
    const form = document.getElementById('emailForm');
    const wrap = document.getElementById('signupWrap');
    const success = document.getElementById('formSuccess');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = form.querySelector('input[name="email"]').value;
      try {
        await fetch('https://script.google.com/macros/s/AKfycbyL9LQL7mF-CkrgptkzDtTSh6CFtTCqUAQaq60gqkQZzdbt-4oVuDErQCMGTs-hMEEw3A/exec', {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });
        form.style.display = 'none';
        wrap.querySelector('.signup__label').style.display = 'none';
        success.style.display = 'block';
      } catch (err) {
        form.style.display = 'none';
        wrap.querySelector('.signup__label').style.display = 'none';
        success.style.display = 'block';
      }
    });
  </script>

</body>
</html>
